<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Fynn :)</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffd6e8 0%, #ffe9b3 50%, #e0c3fc 100%);
      overflow-x: hidden;
      text-align: center;
      padding: 40px 20px 60px;
      position: relative;
    }

    .hearts-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart-el {
      position: absolute;
      animation: floatUp 5s linear forwards;
      opacity: 1;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      80%  { opacity: 0.7; }
      100% { transform: translateY(-120px) rotate(15deg); opacity: 0; }
    }

    h1, .message, .music-player, .surprise-btn, #surprise {
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #ff4f87;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 700;
      margin-bottom: 18px;
      text-shadow: 0 2px 12px rgba(255,79,135,0.18);
    }

    .message {
      font-size: clamp(15px, 2.5vw, 19px);
      color: #5a3060;
      max-width: 560px;
      margin: 0 auto 28px;
      line-height: 1.7;
      font-weight: 500;
      background: rgba(255,255,255,0.45);
      border-radius: 18px;
      padding: 18px 24px;
      backdrop-filter: blur(4px);
    }

    /* Music Player */
    .music-player {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      border-radius: 50px;
      padding: 12px 22px;
      margin-bottom: 28px;
      box-shadow: 0 4px 18px rgba(180,60,120,0.15);
    }

    .play-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ff4f87, #ff7bbd);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 3px 12px rgba(255,79,135,0.35);
    }

    .play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 18px rgba(255,79,135,0.45);
    }

    .song-info { text-align: left; }

    .song-title {
      font-size: 15px;
      font-weight: 700;
      color: #c9456d;
      line-height: 1.2;
    }

    .song-artist {
      font-size: 13px;
      color: #a07090;
      font-weight: 500;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 4px;
      background: rgba(200,100,150,0.25);
      cursor: pointer;
      outline: none;
    }

    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff4f87;
      cursor: pointer;
    }

    .time-display {
      font-size: 12px;
      color: #a07090;
      font-weight: 600;
      min-width: 38px;
    }

    /* Surprise button */
    .surprise-btn {
      padding: 14px 34px;
      font-size: 18px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff4f87, #ff7bbd);
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(255,79,135,0.35);
      transition: transform 0.18s, box-shadow 0.18s;
    }

    .surprise-btn:hover {
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,79,135,0.45);
    }

    .surprise-btn:active { transform: scale(0.97); }

    #surprise {
      display: none;
      margin-top: 36px;
      animation: fadeSlideIn 0.6s ease forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cake {
      font-size: 100px;
      display: inline-block;
      animation: bounce 1.8s ease-in-out infinite;
      margin-bottom: 8px;
      filter: drop-shadow(0 6px 18px rgba(255,100,100,0.22));
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-16px) scale(1.06); }
    }

    .subtitle {
      font-size: clamp(18px, 3.5vw, 26px);
      color: #c9456d;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 520px;
      margin: 0 auto;
      padding: 0 4px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(180,60,120,0.18);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.05) rotate(-1deg);
      box-shadow: 0 10px 30px rgba(180,60,120,0.3);
    }

    .confetti-piece {
      position: fixed;
      animation: confettiFall 3.2s linear forwards;
      pointer-events: none;
      z-index: 999;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="hearts-layer" id="heartsLayer"></div>

  <h1>Happy Birthday Fynn 🎂</h1>

  <p class="message">
    Happy Birthday Fynn! I'm really happy that I met you ❤️<br>
    I hope this year brings you everything you want :)<br>
    And good luck with the exams tomorrow! You've got this 💪
  </p>

  <!-- Music Player -->
  <div class="music-player">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <div class="song-info">
      <div class="song-title">Younger</div>
      <div class="song-artist">The Hails</div>
    </div>
    <div class="progress-wrap">
      <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100" step="0.1" oninput="seekTo(this.value)">
      <span class="time-display" id="timeDisplay">0:00</span>
    </div>
  </div>

  <br>

  <button class="surprise-btn" onclick="startSurprise()">Open your surprise 🎁</button>

  <div id="surprise">
    <div class="cake">🎂</div>
    <p class="subtitle">You're amazing 💖</p>
    <div class="gallery">
      <img src="photos/pic1.JPG" alt="Photo 1">
      <img src="photos/pic2.jpeg" alt="Photo 2">
      <img src="photos/pic3.jpeg" alt="Photo 3">
      <img src="photos/pic4.JPG" alt="Photo 4">
    </div>
  </div>

  <audio id="audio" src="music/younger.mp3" preload="auto"></audio>

  <script>
    const heartEmojis = ['💖','💗','💕','🩷','❤️','💝'];

    function createHeart() {
      const layer = document.getElementById('heartsLayer');
      const heart = document.createElement('div');
      heart.className = 'heart-el';
      heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      heart.style.left = (Math.random() * 95) + '%';
      heart.style.bottom = '-30px';
      heart.style.animationDuration = (3.5 + Math.random() * 2.5) + 's';
      heart.style.fontSize = (16 + Math.random() * 14) + 'px';
      layer.appendChild(heart);
      setTimeout(() => heart.remove(), 6500);
    }

    setInterval(createHeart, 350);

    // Music player
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const timeDisplay = document.getElementById('timeDisplay');
    let isPlaying = false;

    function togglePlay() {
      if (isPlaying) {
        audio.pause();
        playBtn.textContent = '▶';
      } else {
        audio.play();
        playBtn.textContent = '⏸';
      }
      isPlaying = !isPlaying;
    }

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressBar.value = (audio.currentTime / audio.duration) * 100;
        const mins = Math.floor(audio.currentTime / 60);
        const secs = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
        timeDisplay.textContent = `${mins}:${secs}`;
      }
    });

    audio.addEventListener('ended', () => {
      playBtn.textContent = '▶';
      isPlaying = false;
      progressBar.value = 0;
      timeDisplay.textContent = '0:00';
    });

    function seekTo(val) {
      if (audio.duration) {
        audio.currentTime = (val / 100) * audio.duration;
      }
    }

    // Surprise
    let surpriseOpened = false;

    function startSurprise() {
      document.getElementById('surprise').style.display = 'block';
      if (!surpriseOpened) {
        surpriseOpened = true;
        launchConfetti();
      }
    }

    function launchConfetti() {
      const pieces = ['🎉','🎊','✨','🌟','💫','🎈','🎀','🥳'];
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const conf = document.createElement('div');
          conf.className = 'confetti-piece';
          conf.textContent = pieces[Math.floor(Math.random() * pieces.length)];
          conf.style.left = (Math.random() * 100) + 'vw';
          conf.style.top = '-30px';
          conf.style.fontSize = (16 + Math.random() * 14) + 'px';
          conf.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
          conf.style.animationDelay = (Math.random() * 0.8) + 's';
          document.body.appendChild(conf);
          setTimeout(() => conf.remove(), 4500);
        }, i * 25);
      }
    }
  </script>

</body>
</html>
